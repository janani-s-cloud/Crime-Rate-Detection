{% extends "base.html" %}

{% block title %}Crime Analysis - CrimePredict{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .chart-container {
        position: relative;
        height: 60vh;
        width: 100%;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0;">Crime Rate Trends</h1>
        <a href="/" class="btn" style="padding: 8px 16px; font-size: 0.9rem;">Back to Prediction</a>
    </div>

    <div
        style="background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; box-shadow: inset 0 0 5px rgba(0,0,0,0.05);">
        <div style="flex: 1; min-width: 200px;">
            <label for="stateSelect"
                style="display: block; font-weight: bold; margin-bottom: 5px; color: #555;">State</label>
            <select id="stateSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="">All States</option>
            </select>
        </div>
        <div style="flex: 1; min-width: 200px;">
            <label for="districtSelect"
                style="display: block; font-weight: bold; margin-bottom: 5px; color: #555;">District</label>
            <select id="districtSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"
                disabled>
                <option value="">All Districts</option>
            </select>
        </div>
        <div style="flex: 1; min-width: 200px;">
            <label for="crimeTypeSelect"
                style="display: block; font-weight: bold; margin-bottom: 5px; color: #555;">Crime Type</label>
            <select id="crimeTypeSelect"
                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="TOTAL IPC CRIMES">Total IPC Crimes</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end;">
            <button id="applyFilters" class="btn" style="height: 40px; line-height: 1;">Apply Filter</button>
        </div>
    </div>

    <p style="color: #666; margin-bottom: 15px;">Visual analysis of crime trends over the recorded years.</p>

    <div class="chart-container">
        <canvas id="crimeChart"></canvas>
    </div>
</div>

<script src="/static/js/analysis.js"></script>
{% endblock %}
